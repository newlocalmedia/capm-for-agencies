<svg xmlns="http://www.w3.org/2000/svg" width="1014" height="426" viewBox="0 0 1014 426" role="img" aria-labelledby="title desc">
  <title id="title">CAPM for Agencies logo</title>
  <desc id="desc">CAPM for Agencies wordmark with a hurdle-rate icon showing a line from the axes intersection, a green deal above the line, and a red deal below the line.</desc>
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f2e8"/>
      <stop offset="100%" stop-color="#f2e8d7"/>
    </linearGradient>
  </defs>
  <rect width="1014" height="426" fill="#fffdf9"/>

  <g transform="translate(115 66)">
    <rect x="0" y="0" width="295" height="293" rx="40" fill="url(#card)" stroke="#dbc7a8" stroke-width="4"/>
    <line x1="72" y1="246" x2="72" y2="84" stroke="#8b7b67" stroke-width="5" stroke-linecap="round"/>
    <line x1="72" y1="246" x2="249" y2="246" stroke="#8b7b67" stroke-width="5" stroke-linecap="round"/>
    <path d="M72 246 L234 111" fill="none" stroke="#234d78" stroke-width="12" stroke-linecap="butt" stroke-linejoin="round"/>

    <line x1="205" y1="95" x2="205" y2="142" stroke="#456d49" stroke-width="4" stroke-dasharray="8 7" stroke-linecap="round"/>
    <circle cx="205" cy="95" r="13" fill="#4f7b53" stroke="#fffdf9" stroke-width="5"/>

    <line x1="151" y1="186" x2="151" y2="220" stroke="#bf5c48" stroke-width="4" stroke-dasharray="8 7" stroke-linecap="round"/>
    <circle cx="151" cy="220" r="13" fill="#c55443" stroke="#fffdf9" stroke-width="5"/>
  </g>

  <g transform="translate(497 88)">
    <text x="0" y="77" font-family="Georgia, 'Times New Roman', serif" font-size="108" font-weight="700" fill="#211b17">CAPM</text>
    <text x="334" y="107" font-family="Georgia, 'Times New Roman', serif" font-size="60" font-style="italic" font-weight="700" fill="#a8a6a3">for</text>
    <text x="0" y="217" font-family="Georgia, 'Times New Roman', serif" font-size="86" font-weight="700" fill="#211b17">Agencies</text>
  </g>
</svg>
